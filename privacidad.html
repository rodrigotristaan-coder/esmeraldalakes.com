    <h1 data-es="Aviso de Privacidad" data-en="Privacy Notice"></h1>
    <p class="updated" data-es="Última actualización: 21 de julio de 2026" data-en="Last updated: July 21, 2026"></p>

    <p data-es="En cumplimiento de la Ley Federal de Protección de Datos Personales en Posesión de los Particulares (LFPDPPP), te informamos cómo tratamos tus datos personales cuando usas <strong>esmeraldalakes.com</strong>." data-en="In compliance with Mexico's Federal Law on the Protection of Personal Data Held by Private Parties (LFPDPPP), this notice explains how we handle your personal data when you use <strong>esmeraldalakes.com</strong>."></p>

    <h2 data-es="1 · Responsable" data-en="1 · Data controller"></h2>
    <p data-es="El responsable del tratamiento de tus datos es el anfitrión del Departamento Esmeralda, Condominio Diamante Lakes (Revolcadero, Puerto Marqués, 39890 Acapulco de Juárez, Guerrero, México). Contacto: <a href='mailto:hola@satorimkt.com'>hola@satorimkt.com</a>." data-en="The data controller is the host of the Esmeralda apartment, Diamante Lakes condominium (Revolcadero, Puerto Marqués, 39890 Acapulco de Juárez, Guerrero, Mexico). Contact: <a href='mailto:hola@satorimkt.com'>hola@satorimkt.com</a>."></p>

    <h2 data-es="2 · Datos que recabamos" data-en="2 · Data we collect"></h2>
    <p data-es="Al enviar una solicitud de reserva o iniciar sesión en el portal de clientes recabamos: nombre, correo electrónico, teléfono / WhatsApp, país de origen, fechas de estancia, número de huéspedes y, si los proporcionas, mensaje y código de recomendación. <strong>No recabamos datos sensibles</strong> ni datos bancarios a través de este sitio." data-en="When you submit a booking request or sign in to the guest portal we collect: name, email, phone / WhatsApp, country, stay dates, number of guests and, if you provide them, a message and a referral code. <strong>We do not collect sensitive data</strong> or bank details through this website."></p>

    <h2 data-es="3 · Para qué los usamos" data-en="3 · How we use it"></h2>
    <ul>
      <li data-es="Gestionar tu solicitud de reserva: confirmar disponibilidad, precio y forma de pago." data-en="To manage your booking request: confirming availability, price and payment method."></li>
      <li data-es="Comunicarnos contigo sobre tu estancia (confirmación, guía del huésped, acceso al departamento)." data-en="To communicate with you about your stay (confirmation, guest guide, apartment access)."></li>
      <li data-es="Operar tu cuenta del portal de clientes y el programa de recomendaciones (noches gratis)." data-en="To operate your guest portal account and the referral program (free nights)."></li>
      <li data-es="Con tu consentimiento, enviarte avisos de ofertas o fechas especiales (puedes darte de baja en cualquier momento)." data-en="With your consent, to send you offers or special-date alerts (you can opt out at any time)."></li>
    </ul>

    <h2 data-es="4 · Cookies y analítica" data-en="4 · Cookies and analytics"></h2>
    <p data-es="Usamos Google Analytics 4 para medir de forma agregada el uso del sitio (páginas vistas, origen de la visita). Puedes bloquear las cookies desde la configuración de tu navegador sin que el sitio deje de funcionar." data-en="We use Google Analytics 4 to measure site usage in aggregate (page views, traffic source). You can block cookies in your browser settings and the site will still work."></p>

    <h2 data-es="5 · Con quién se comparten" data-en="5 · Who we share it with"></h2>
    <p data-es="No vendemos ni cedemos tus datos. Solo los tratan los proveedores tecnológicos que hacen funcionar el servicio (alojamiento web y envío de correos transaccionales), bajo sus propias medidas de seguridad, y las autoridades cuando exista una obligación legal." data-en="We do not sell or share your data. It is processed only by the technology providers that run this service (web hosting and transactional email), under their own security measures, and by authorities where legally required."></p>

    <h2 data-es="6 · Tus derechos (ARCO)" data-en="6 · Your rights (ARCO)"></h2>
    <p data-es="Puedes solicitar el acceso, rectificación, cancelación u oposición al tratamiento de tus datos, así como revocar tu consentimiento, escribiendo a <a href='mailto:hola@satorimkt.com'>hola@satorimkt.com</a> con el asunto 'Datos personales'. Responderemos en un máximo de 20 días hábiles." data-en="You may request access to, correction or deletion of your data, object to its processing, or withdraw your consent by writing to <a href='mailto:hola@satorimkt.com'>hola@satorimkt.com</a> with the subject line 'Personal data'. We will reply within 20 business days."></p>

    <h2 data-es="7 · Cambios a este aviso" data-en="7 · Changes to this notice"></h2>

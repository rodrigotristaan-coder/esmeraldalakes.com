<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Panel · Esmeralda</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root { --g:#0a5944; --gb:#06d67e; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 0 auto; padding: 24px; color: #16231f; background: #f6f1e7; }
    h1 { color: var(--g); font-size: 1.4rem; }
    h2 { color: var(--g); font-size: 1.05rem; margin-top: 1.6rem; }
    .card { background: #fff; border: 1px solid #e0e8e4; border-radius: 10px; padding: 12px 14px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .muted { color: #5e6e68; font-size: .85rem; }
    input { padding: 8px 10px; border: 1px solid #cdd; border-radius: 8px; font: inherit; }
    button { background: var(--g); color: #fff; border: 0; border-radius: 8px; padding: 8px 14px; font-weight: 700; cursor: pointer; }
    button.danger { background: #b23b3b; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    #msg { margin: 10px 0; font-weight: 600; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>🛠 Panel Esmeralda — Reservas</h1>
  <p class="muted">Privado. Aquí ves y gestionas las fechas bloqueadas (web + Airbnb).</p>

  <div id="login">
    <div class="row">
      <input id="key" type="password" placeholder="Contraseña del panel" />
      <button id="enter">Entrar</button>
    </div>
  </div>

  <div id="app" class="hidden">
    <p id="msg"></p>

    <h2>➕ Bloquear fechas manualmente</h2>
    <div class="row">
      <input id="bstart" type="date" /> <input id="bend" type="date" />
      <button id="addblock">Bloquear</button>
    </div>

    <h2>🟢 Reservas directas (puedes liberar)</h2>
    <div id="direct"></div>

    <h2>📅 Todas las fechas ocupadas (incluye Airbnb)</h2>
    <div id="all"></div>

    <p class="row"><button id="logout" class="danger">Cerrar sesión</button></p>
  </div>

  <script src="/admin-app.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RMY6RJFS7Q"></script>
  <script src="/assets/ga.js"></script>
  <title>¡Gracias! · Esmeralda · Diamante Lakes</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <meta name="theme-color" content="#0a5944" />
  <style>
    @font-face{font-family:'Fraunces';font-style:normal;font-weight:700;font-display:swap;src:url(/assets/fonts/fraunces-700-latin.woff2) format('woff2');}
    @font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url(/assets/fonts/inter-400-latin.woff2) format('woff2');}
    @font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url(/assets/fonts/inter-600-latin.woff2) format('woff2');}
    :root{--emerald:#0f7a5f;--emerald-dark:#0a5944;--aqua:#06d67e;--ink:#16231f;--white:#fff}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Inter",system-ui,sans-serif;color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2.5rem 1.2rem;background:linear-gradient(135deg,var(--emerald-dark),var(--emerald) 70%,#2bc4c9)}
    .lang{position:fixed;top:1rem;right:1.2rem;display:inline-flex;border:1px solid rgba(255,255,255,.5);border-radius:999px;overflow:hidden}
    .lang button{background:transparent;border:0;color:#fff;font:600 .8rem "Inter",sans-serif;padding:.35rem .7rem;cursor:pointer;letter-spacing:.04em}
    .lang button.on{background:var(--aqua);color:#062c22}
    .card{max-width:600px;width:100%;text-align:center}
    .gem{color:var(--aqua)}
    .brand{font-family:"Fraunces",serif;font-weight:700;font-size:1.2rem;margin-bottom:2rem;opacity:.92}
    .check{width:80px;height:80px;border-radius:50%;background:var(--aqua);color:#062c22;display:flex;align-items:center;justify-content:center;font-size:2.6rem;font-weight:700;margin:0 auto 1.4rem;box-shadow:0 12px 30px -8px rgba(6,214,126,.6)}
    h1{font-family:"Fraunces",serif;font-size:clamp(2.2rem,7vw,3.2rem);margin-bottom:.6rem}
    .sub{font-size:1.08rem;opacity:.95;line-height:1.6;margin:0 auto 2.2rem;max-width:460px}
    .menu{display:flex;flex-wrap:wrap;gap:.7rem;justify-content:center}
    .menu a{display:inline-block;padding:.6rem 1.15rem;border-radius:999px;text-decoration:none;font-weight:600;font-size:.95rem;border:2px solid rgba(255,255,255,.45);color:#fff;transition:background .18s ease}
    .menu a:hover{background:rgba(255,255,255,.14)}
    .menu a.primary{background:var(--aqua);color:#062c22;border-color:var(--aqua)}
  </style>
</head>
<body>
  <div class="lang">
    <button type="button" data-lang="es">ES</button>
    <button type="button" data-lang="en">EN</button>
  </div>

  <main class="card">
    <p class="brand"><span class="gem">◆</span> Esmeralda</p>
    <div class="check" aria-hidden="true">✓</div>
    <h1 data-es="¡Gracias!" data-en="Thank you!"></h1>
    <p class="sub" data-es="Recibimos tu solicitud. Te contactaremos muy pronto (en menos de 24 h) para confirmar disponibilidad, precio y forma de pago. 🌴" data-en="We received your request. We'll contact you very soon (within 24 hours) to confirm availability, price and payment. 🌴"></p>
    <nav class="menu" aria-label="Menú">
      <a class="primary" href="/" data-es="Inicio" data-en="Home"></a>
      <a href="/#departamento" data-es="El depa" data-en="The apartment"></a>
      <a href="/#amenidades" data-es="Amenidades" data-en="Amenities"></a>
      <a href="/#ubicacion" data-es="Ubicación" data-en="Location"></a>
      <a href="/#seguridad" data-es="Seguridad" data-en="Safety"></a>
      <a href="/#galeria" data-es="Fotos" data-en="Photos"></a>
      <a href="/blog.html" data-es="Blog" data-en="Blog"></a>
    </nav>
  </main>

  <script src="/assets/gracias.js"></script>
</body>
</html>
